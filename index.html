<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASSIM XITER</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #050505;
            color: white;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0,89,255,.12), transparent 35%),
                radial-gradient(circle at 80% 50%, rgba(0,89,255,.15), transparent 35%);
            z-index: -1;
        }

        /* --- HEADER FIXED --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(5, 5, 5, 0.75); /* تم ضبط الخلفية لمنع التداخل اللوني والتغبيش المشوه */
            z-index: 999;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo span {
            color: #2563ff;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            color: #cfcfcf;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 500;
            transition: .3s ease;
        }

        nav a:hover {
            color: #2563ff;
        }

        .discord-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(90deg, #5865F2, #4752C4);
            padding: 10px 22px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(88,101,242,.4);
            transition: .3s ease;
        }

        .discord-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(88,101,242,.6);
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 140px 8% 60px 8%;
            gap: 40px;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-text h1 {
            font-size: 75px;
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .hero-text h1 span {
            color: #2563ff;
        }

        .hero-text p {
            color: #b3b3b3;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .buy-btn {
            display: inline-block;
            background: white;
            color: black;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: .3s ease;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .buy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,255,255,0.25);
        }

        .hero-image img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 20px;
            filter: drop-shadow(0 0 35px rgba(37,99,255,0.4));
        }

        /* --- PRICING SECTION --- */
        .pricing {
            padding: 100px 8%;
        }

        .section-title {
            text-align: center;
            font-size: 50px;
            margin-bottom: 60px;
            font-weight: 800;
        }

        .section-title span {
            color: #2563ff;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(37,99,255,.15);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform .4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .4s ease, border .4s ease;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(37,99,255,.6);
            box-shadow: 0 15px 35px rgba(37,99,255,0.25);
        }

        .card h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #fff;
            letter-spacing: 1px;
        }

        .price {
            font-size: 48px;
            color: #2563ff;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .card button {
            width: 100%;
            border: none;
            padding: 14px 0;
            border-radius: 50px;
            background: linear-gradient(90deg, #2563ff, #4f46e5);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: .3s ease;
        }

        .card button:hover {
            box-shadow: 0 5px 15px rgba(37,99,255,0.4);
            opacity: 0.95;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* --- ANIMATIONS --- */
        .glow {
            animation: glow 2.5s infinite alternate ease-in-out;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(37,99,255,0.3); }
            to { text-shadow: 0 0 25px rgba(37,99,255,0.8); }
        }

        /* --- RESPONSIVE DESIGN --- */
        @media(max-width: 991px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                padding-top: 140px;
            }

            .hero-text h1 {
                font-size: 55px;
            }

            .hero-image img {
                max-width: 380px;
            }

            .menu-toggle {
                display: block;
                order: 2;
            }

            header {
                padding: 20px 5%;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(5, 5, 5, 0.98);
                backdrop-filter: blur(10px);
                padding: 20px 0;
                border-bottom: 1px solid rgba(37,99,255,.2);
            }

            nav.active {
                display: flex;
            }

            nav a {
                margin: 15px 0;
                font-size: 18px;
            }

            .discord-btn {
                margin-left: auto;
                margin-right: 20px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">RASSIM <span>XITER</span></div>

    <nav id="nav-menu">
        <a href="#">Home</a>
        <a href="#pricing">Panel</a>
        <a href="#pricing">Pricing</a>
    </nav>

    <a class="discord-btn" href="https://discord.gg/gwpcC6YF6B" target="_blank" rel="noopener">
        <i class="fa-brands fa-discord"></i>
        Discord
    </a>

    <div class="menu-toggle" id="mobile-menu">
        <i class="fa-solid fa-bars"></i>
    </div>
</header>

<main>
    <section class="hero">
        <div class="hero-text">
            <h1 class="glow">PURE <span>POWER</span></h1>
            <p>
                Premium Panels and Services by RASSIM XITER.<br>
                Fast, secure, and engineered for a seamless professional experience.
            </p>
            <a class="buy-btn" href="#pricing">BUY PANEL</a>
        </div>

        <div class="hero-image">
            <img src="https://i.postimg.cc/FKrmLg4n/DFC4632F-0FAE-4920-8F90-8D36E7C7DE1D.png" alt="Rassim Xiter Showcase">
        </div>
    </section>

    <section class="pricing" id="pricing">
        <h1 class="section-title">PANEL <span>BUY</span></h1>

        <div class="cards">
            <div class="card">
                <h2>7 DAYS</h2>
                <div class="price">$10</div>
                <button>BUY NOW</button>
            </div>

            <div class="card">
                <h2>30 DAYS</h2>
                <div class="price">$15</div>
                <button>BUY NOW</button>
            </div>

            <div class="card">
                <h2>90 DAYS</h2>
                <div class="price">$30</div>
                <button>BUY NOW</button>
            </div>

            <div class="card">
                <h2>LIFETIME</h2>
                <div class="price">$50</div>
                <button>BUY NOW</button>
            </div>
        </div>
    </section>
</main>

<footer>
    &copy; 2026 RASSIM XITER - All Rights Reserved
</footer>

<script>
    // التحكم بالقائمة الجانبية للهواتف
    const mobileMenu = document.getElementById('mobile-menu');
    const navMenu = document.getElementById('nav-menu');

    mobileMenu.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        const icon = mobileMenu.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-xmark');
    });

    document.querySelectorAll('nav a').forEach(link => {
        link.addEventListener('click', () => {
            navMenu.classList.remove('active');
            const icon = mobileMenu.querySelector('i');
            icon.classList.add('fa-bars');
            icon.classList.remove('fa-xmark');
        });
    });
</script>

</body>
</html>
